# -- Theme Options --
# These options control how the theme functions and allow you to
# customise the display of your website.
#
# Refer to the theme docs for more details about each of these parameters.
# https://blowfish.page/docs/configuration/#theme-parameters

colorScheme = "fire"
defaultAppearance = "dark" # 다크모드 고정
autoSwitchAppearance = true

enableA11y = false
enableSearch = true
enableCodeCopy = false
enableStructuredBreadcrumbs = false

replyByEmail = false

mainSections = ["posts"] # 주석 해제하고 posts 폴더 연결
# robots = ""

disableImageOptimization = false
disableImageOptimizationMD = false
disableTextInHeader = false

hotlinkFeatureImage = false

fingerprintAlgorithm = "sha512"

giteaDefaultServer = "https://git.fsfe.org"
forgejoDefaultServer = "https://v11.next.forgejo.org"

[header]
  layout = "basic"

[footer]
  showMenu = true
  showCopyright = true
  showThemeAttribution = true
  showAppearanceSwitcher = true
  showScrollToTop = true

[homepage]
  layout = "profile" # 홈페이지 레이아웃을 카드로 변경
  showRecent = true # 메인 화면에 최근 글 보이게 켜기
  showRecentItems = 10 # 10개까지 노출
  showMoreLink = true # 더보기 버튼 켜기
  showMoreLinkDest = "/posts/"
  cardView = true # 카드 뷰 활성화
  cardViewScreenWidth = false
  layoutBackgroundBlur = false 
  disableHeroImageFilter = false 

[article]
  showDate = true
  showViews = false
  showLikes = false
  showDateOnlyInArticle = false
  showDateUpdated = false
  showAuthor = true
  showHero = false
  layoutBackgroundBlur = true 
  layoutBackgroundHeaderSpace = true 
  showBreadcrumbs = false
  showDraftLabel = true
  showEdit = false
  editAppendPath = true
  seriesOpened = false
  showHeadingAnchors = true
  showPagination = true
  invertPagination = false
  showReadingTime = true
  showTableOfContents = true # 글 읽을 때 우측 목차 켜기
  showTaxonomies = false 
  showCategories = true 
  showTags = true 
  showCategoriesInSecondaryColor = false 
  showAuthorsBadges = false
  showWordCount = true
  showZenMode = false

[list]
  showHero = false
  layoutBackgroundBlur = true 
  layoutBackgroundHeaderSpace = true 
  showBreadcrumbs = false
  showSummary = false
  showViews = false
  showLikes = false
  showTableOfContents = false
  showCards = true # 리스트에서도 카드 형태 켜기
  orderByWeight = false
  groupByYear = true
  cardView = true # 리스트 카드 뷰 활성화
  cardViewScreenWidth = false
  constrainItemsWidth = false

[sitemap]
  excludedKinds = ["taxonomy", "term"]

[taxonomy]
  showTermCount = true
  showHero = false
  layoutBackgroundBlur = true 
  layoutBackgroundHeaderSpace = true 
  showBreadcrumbs = false
  showViews = false
  showLikes = false
  showTableOfContents = false
  cardView = true

[term]
  showHero = false
  layoutBackgroundBlur = true 
  layoutBackgroundHeaderSpace = true 
  showBreadcrumbs = false
  showViews = false
  showLikes = false
  showTableOfContents = true
  groupByYear = false
  cardView = true
  cardViewScreenWidth = false

# (아래 Firebase, Analytics 등의 설정은 비워두신 상태 그대로 유지했습니다)
[firebase]
[fathomAnalytics]
[umamiAnalytics]
[selineAnalytics]
[buymeacoffee]
[verification]
[rssnext]
[advertisement]