[[menu.main]]
identifier = "search"
name = "검색"
url = "/search/"
weight = 20

# --- 댓글(Giscus) 설정 ---
[params.comments]
enabled = true
provider = "giscus"

[params.comments.giscus]
repo = "jpcorps/jpcorps.github.io"
repoId = "R_kgDOSSJrIA"
category = "Announcements"
categoryId = "DIC_kwDOSSJrIM4C8P_5"
mapping = "pathname"
strict = "0"
reactionsEnabled = "1"
emitMetadata = "0"
inputPosition = "bottom"
lang = "ko"
# 테마가 제멋대로 결정하지 못하도록 두 가지 모드를 다 지정합니다.
lightTheme = "light"
darkTheme = "transparent_dark"
