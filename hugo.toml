baseURL = "https://jpcorps.github.io/"
title = "대충 살아가는 게임개발자"
theme = "hugo-theme-stack"
defaultContentLanguage = "ko"
hasCJKLanguage = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  mainSections = ["posts"]

[params.sidebar]
  subtitle = "이글루스와 티스토리를 거쳐 방황하다가 여기까지 대충 흘러왔습니다"
  avatar = "profile.jpg"

[languages]
  [languages.ko]
    languageCode = "ko-kr"
    languageName = "Korean"
    weight = 1

[[menu.main]]
  identifier = "categories"
  name = "카테고리"
  url = "/categories/"
  weight = 10

[[menu.main]]
  identifier = "search"
  name = "검색"
  url = "/search/"
  weight = 20

# 가장 아래에 추가하는 예시 (어떤 [섹션]에도 속하지 않도록)
timeout = "10m"