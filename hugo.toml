baseURL = "https://jpcorps.com/"
title = "대충 살아가는 게임개발자"
theme = "hugo-theme-stack"
defaultContentLanguage = "ko"
hasCJKLanguage = true

[outputs]
home = ["html", "rss", "json"]

[params]
mainSections = ["posts"]
customCSS = ["scss/custom.scss"] # 💡 우리가 만든 커스텀 디자인을 연결해주는 핵심 코드입니다!

# 에러를 뿜는 서비스 워커(PWA) 기능을 완전히 끕니다.
[params.pwa]
enabled = false

[params.sidebar]
subtitle = "이글루스와 티스토리를 거쳐 방황하다가 여기까지 대충 흘러왔습니다"
avatar = "profile.png"

[languages]
[languages.ko]
languageCode = "ko-kr"
languageName = "Korean"
weight = 1

[[menu.main]]
identifier = "categories"
name = "카테고리"
url = "/categories/"
weight = 10

# 현재 사용 중인 이글루스 백업 메뉴
[[menu.main]]
identifier = "egloos-backup"
name = " └ 이글루스 백업"
url = "/categories/이글루스-백업/"
weight = 11

# ==========================================
