baseURL = "https://jpcorps.com/"
title = "대충 살아가는 게임개발자"
theme = "hugo-theme-stack"
defaultContentLanguage = "ko"
hasCJKLanguage = true

[outputs]
  home = ["html", "rss", "json"]

[params]
  mainSections = ["posts"]

# 에러를 뿜는 서비스 워커(PWA) 기능을 완전히 끕니다.
[params.pwa]
  enabled = false

[params.sidebar]
  subtitle = "이글루스와 티스토리를 거쳐 방황하다가 여기까지 대충 흘러왔습니다"
  avatar = "profile.png"

[languages]
  [languages.ko]
    languageCode = "ko-kr"
    languageName = "Korean"
    weight = 1

[[menu.main]]
  identifier = "categories"
  name = "카테고리"
  url = "/categories/"
  weight = 10

[[menu.main]]
  identifier = "search"
  name = "검색"
  url = "/search/"
  weight = 20

# --- 댓글(Giscus) 설정 ---
[params.comments]
    enabled = true
    provider = "giscus"

[params.comments.giscus]
    repo = "jpcorps/jpcorps.github.io"
    repoId = "R_kgDOSSJrIA"
    category = "Announcements"
    categoryId = "DIC_kwDOSSJrIM4C8P_5"
    mapping = "pathname"
    strict = "0"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "bottom"
    theme = "transparent_dark"
    lang = "ko"