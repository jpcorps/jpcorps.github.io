baseURL = "https://jpcorps.com/"
title = "대충 살아가는 게임개발자"
theme = "hugo-theme-stack"
defaultContentLanguage = "ko"
hasCJKLanguage = true

[outputs]
home = ["html", "rss", "json"]

[params]
mainSections = ["posts"]

# 1. PWA (에러 방지를 위해 비활성화)
[params.pwa]
enabled = false

# 2. 사이드바 설정
[params.sidebar]
subtitle = "이글루스와 티스토리를 거쳐 방황하다가 여기까지 대충 흘러왔습니다"
avatar = "profile.png"

# 3. 댓글(Giscus) 설정 - 다크모드 최적화
[params.comments]
enabled = true
provider = "giscus"

[params.comments.giscus]
repo = "jpcorps/jpcorps.github.io"
repoId = "R_kgDOSSJrIA"
category = "Announcements"
categoryId = "DIC_kwDOSSJrIM4C8P_5"
mapping = "pathname"
strict = "0"
reactionsEnabled = "1"
emitMetadata = "0"
inputPosition = "bottom"
lang = "ko"
theme = "github-dark"               # 댓글창을 어둡게 고정

# 4. 게시물 수정 버튼 설정
[params.article]
# Stack 테마는 아래 url 설정이 있으면 자동으로 수정 버튼을 생성합니다.
[params.article.editLink]
url = "https://github.com/jpcorps/jpcorps.github.io/edit/main/content"

# 5. 메뉴 설정
[[menu.main]]
identifier = "categories"
name = "카테고리"
url = "/categories/"
weight = 10

[[menu.main]]
identifier = "egloos-backup"
name = " └ 이글루스 백업"
url = "/categories/이글루스-백업/"
weight = 11

[[menu.main]]
identifier = "search"
name = "검색"
url = "/search/"
weight = 20

# 6. 언어 설정
[languages]
[languages.ko]
languageCode = "ko-kr"
languageName = "Korean"
weight = 1
