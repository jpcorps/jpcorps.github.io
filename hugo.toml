# 나중에 새로운 카테고리를 사이드바에 바로가기로 빼고 싶을 때,
# 아래 코드들의 맨 앞 주석 기호(#)를 지우고 내용만 바꿔서 사용하세요.
# (참고: url 부분의 한글 띄어쓰기는 하이픈(-)으로 바꿔야 합니다)
